async function runImport() {
  const btn = document.getElementById('btn');
  const log = document.getElementById('log');
  btn.disabled = true;
  log.innerHTML = '';

  function write(msg, cls) {
    const line = document.createElement('div');
    line.className = cls || '';
    line.textContent = msg;
    log.appendChild(line);
  }

  write(`شروع import — ${products.length} محصول...`);

  const ok = await window.PIRO.importProducts(products);

  if (ok) {
    write(`✓ همه ${products.length} محصول با موفقیت وارد شدند!`, 'ok');
    write('حالا می‌توانید این صفحه را ببندید.', 'ok');
  } else {
    write('✗ خطا در import — Console مرورگر را بررسی کنید.', 'err');
    btn.disabled = false;
  }
}
</script>
